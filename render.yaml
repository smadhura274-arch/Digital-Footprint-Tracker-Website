services:
  # ── Unified Web Service (Backend + Frontend) ────────────────────────────────
  # This service handles both the API and serves the static frontend files.
  - type: web
    name: digital-footprint-tracker
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm --prefix backend install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # REQUIRED: Set your MongoDB Atlas URI in Render Dashboard
      - key: JWT_SECRET
        sync: false          # REQUIRED: Set a secure secret in Render Dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false          # Optional: Your production URL
      - key: PORT
        value: 10000
