services:
  # ── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: digital-footprint-tracker-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set this in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false          # Set to your static site URL after it's created

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: digital-footprint-tracker-frontend
    runtime: static
    plan: free
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
