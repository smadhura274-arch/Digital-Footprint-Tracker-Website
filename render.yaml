services:
  # ── Unified Web Service (Backend + Frontend) ────────────────────────────────
  - type: web
    name: digital-footprint-tracker
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm --prefix backend install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set this value manually in the Render Dashboard for security
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://digital-footprint-tracker.onrender.com
