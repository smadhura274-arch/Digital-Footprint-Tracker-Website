services:
  - type: web
    name: digital-footprint-tracker-website
    runtime: node
    plan: free
    buildCommand: npm install && npm --prefix backend install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
