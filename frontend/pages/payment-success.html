<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Successful | Digital Footprint Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, rgba(197, 138, 62, 0.22), transparent 48%),
                linear-gradient(135deg, #f4ead6 0%, #d7c1a0 35%, #b58d63 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            background: rgba(255, 250, 241, 0.95);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(47, 36, 27, 0.15);
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(197, 138, 62, 0.2);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #00c9a7;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        h1 {
            color: #2f241b;
            margin-bottom: 1rem;
        }

        p {
            color: #6b5b4e;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #7b4b2a, #c58a3e);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(123, 75, 42, 0.2);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-circle"><i class="fas fa-crown"></i></div>
        <h1>Payment Successful!</h1>
        <p id="statusMessage">Finalizing your Premium activation...</p>
        <a href="dashboard.html" class="btn">Return to Dashboard</a>
    </div>

    <script>
        async function finalizeUpgrade() {
            const statusText = document.getElementById('statusMessage');
            const token = localStorage.getItem('token');

            if (!token) {
                statusText.innerText = "User session not found. Please log in to complete activation.";
                return;
            }

            // Instead of triggering the upgrade, we poll the server to see 
            // when the webhook has finished processing the payment.
            let attempts = 0;
            const maxAttempts = 10;
            statusText.innerText = "Verifying your secure payment...";

            try {
                const checkInterval = setInterval(async () => {
                    attempts++;
                    const response = await fetch('/api/auth/me', {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    const data = await response.json();

                    if (response.ok && data.user.isPremium) {
                        clearInterval(checkInterval);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        statusText.innerHTML = "Your <strong>Premium</strong> features are now active! Welcome to the inner circle.";
                    } else if (attempts >= maxAttempts) {
                        clearInterval(checkInterval);
                        statusText.innerText = "Payment received! It might take a moment to sync your profile. Please check your dashboard in a few minutes.";
                    }
                }, 2000); // Check every 2 seconds

            } catch (error) {
                console.error(error);
                statusText.innerText = "Connection error while activating premium features.";
            }
        }
        window.onload = finalizeUpgrade;
    </script>
</body>

</html>
