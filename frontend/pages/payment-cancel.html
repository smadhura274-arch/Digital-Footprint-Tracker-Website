<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | Digital Footprint Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 100% 100%, rgba(123, 75, 42, 0.18), transparent 52%),
                linear-gradient(135deg, #f4ead6 0%, #d7c1a0 35%, #b58d63 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            background: rgba(255, 250, 241, 0.95);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(47, 36, 27, 0.15);
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        h1 {
            color: #2f241b;
            margin-bottom: 1rem;
        }

        p {
            color: #6b5b4e;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #7b4b2a;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-circle"><i class="fas fa-times"></i></div>
        <h1>Upgrade Cancelled</h1>
        <p>Your subscription was not processed and no charges were made. You can try again whenever you're ready.</p>
        <a href="dashboard.html" class="btn">Back to Dashboard</a>
    </div>
</body>

</html>
